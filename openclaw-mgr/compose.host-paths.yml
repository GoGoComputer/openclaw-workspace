# =============================================================================
# compose.host-paths.yml — sandbox 호스트 경로 일치 오버레이 / Host-path
# alignment overlay for sandbox sub-containers.
#
# WHY
# OpenClaw 의 sandbox 모듈은 sub-container 를 `docker.sock` 으로 띄울 때
# mount source 로 자기가 본 경로를 그대로 넘긴다 (`hostPath = workspaceDir`,
# `workspaceDir = OPENCLAW_WORKSPACE_DIR`). gateway 컨테이너 안에서 이 값은
# `/home/node/.openclaw/workspace` 같은 **컨테이너 내부 경로**라, macOS
# Docker Desktop 의 daemon 입장에선 호스트의 `/home/node/...` 를 찾으려다
# `mounts denied: The path /home/node/... is not shared from the host` 로
# 떨어진다. OpenClaw 본체는 호스트 경로 변환 env 변수를 읽지 않는다 (확인:
# `grep process.env.OPENCLAW_HOST` → 0건).
#
# FIX
# gateway/cli 컨테이너 안에서도 OpenClaw 의 모든 경로 변수를 **호스트와 동일한
# 절대 경로**(`$HOME/.openclaw/...`) 로 설정하고, 같은 경로를 컨테이너에
# 마운트한다. 그러면 OpenClaw 가 sandbox sub-container 에 `-v
# /Users/mo/.openclaw/sandboxes/...` 를 넘기고 daemon 은 그 경로를 호스트의
# 실제 디렉터리로 해석할 수 있다.
#
# 보안: 컨테이너 안 사용자가 호스트의 $HOME 일부에 접근하는 게 새로 늘진 않는다
# (base compose 가 이미 같은 디렉터리를 다른 mountpoint 로 노출 중). 단지
# **경로 이름**만 호스트와 일치시키는 것.
#
# Copyright 2026 박성모 Park Sungmo — MIT License
# =============================================================================
services:
  openclaw-gateway:
    volumes:
      # 호스트 경로 = 컨테이너 경로. base 의 `/home/node/...` 마운트는 그대로
      # 두고 (이 오버레이는 add-on), env 가 가리키는 새 경로만 추가 노출.
      - ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}:${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      - ${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}:${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}
    environment:
      # OpenClaw 본체가 envHomedir() 로 읽는 값들을 호스트 경로로 override.
      # 이게 sandbox mount 인자가 호스트 daemon 에 통하는 핵심.
      HOME: ${HOME}
      OPENCLAW_HOME: ${HOME}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}/openclaw.json
      OPENCLAW_STATE_DIR: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}
  openclaw-cli:
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}:${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      - ${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}:${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}
    environment:
      HOME: ${HOME}
      OPENCLAW_HOME: ${HOME}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}/openclaw.json
      OPENCLAW_STATE_DIR: ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR:-${HOME}/DEV/openclawAgent}
