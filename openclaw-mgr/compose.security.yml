# =============================================================================
# compose.security.yml — 보안 강화 override
# 사용: docker compose -f docker-compose.yml -f compose.security.yml up -d
# openclaw-gateway / openclaw-cli 서비스에 cap_drop / no-new-privileges /
# 리소스 한도 강제. 포트를 127.0.0.1 로만 바인딩 (LAN 노출 차단).
# ⚠ 서비스명 openclaw-gateway / openclaw-cli 은 openclaw/openclaw 공식 명칭.
# Copyright 2026 박성모 Park Sungmo — MIT License
# =============================================================================
services:
  openclaw-gateway:
    cap_drop: [ALL]
    cap_add: []
    # 주의: 베이스 docker-compose.yml 의 openclaw-gateway 가 이미
    #   security_opt: [no-new-privileges:true]
    # 를 갖고 있다 (line 59-60). compose v2 는 시퀀스를 concat 하므로 여기서
    # 같은 항목을 다시 적으면 "items at 0 and 1 are equal" 검증 오류가 난다.
    # 이미 no-new-privileges 가 적용되므로 override 에서는 다시 선언하지 않는다.
    # (openclaw-cli 아래 동일 주석 참조 — 그쪽은 먼저 고쳤지만 게이트웨이에
    # 같은 수정이 빠져 있었다.)
    pids_limit: 512
    mem_limit: ${OPENCLAW_MEM_LIMIT:-8g}
    memswap_limit: ${OPENCLAW_MEM_LIMIT:-8g}
    cpus: ${OPENCLAW_CPUS:-8}
    # 포트는 항상 127.0.0.1 만 — LAN/공용 Wi-Fi 외부 노출 완전 차단.
    # `!override` 는 베이스 compose 의 ports 리스트(0.0.0.0 바인딩) 를
    # 통째로 교체한다. 이걸 쓰지 않으면 compose v2 가 두 리스트를 머지해서
    # 같은 호스트 포트를 두 번(0.0.0.0:18789 + 127.0.0.1:18789) 바인드하려다
    # "address already in use" 로 실패한다.
    ports: !override
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    # 첫 실행 직후 인증/설정이 비어 있어도 게이트웨이가 부팅되도록
    # `--allow-unconfigured` 를 명시. 베이스 docker-compose.yml 의
    # command 를 통째로 override 한다 (compose v2 는 command 를 merge 하지
    # 않고 교체하기 때문). 사용자는 나중에 `openclaw setup` / 토큰 입력으로
    # 정식 설정을 추가할 수 있다.
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - "${OPENCLAW_GATEWAY_BIND:-auto}"
      - --port
      - "18789"
      - --allow-unconfigured

  openclaw-cli:
    cap_drop: [ALL]
    # 주의: 베이스 docker-compose.yml 의 openclaw-cli 가 이미
    #   security_opt: [no-new-privileges:true]
    # 를 갖고 있다. compose v2 는 시퀀스를 concat 하므로 여기서 같은 항목을
    # 다시 적으면 "items at 0 and 1 are equal" 검증 오류가 난다. 이미
    # no-new-privileges 가 적용되므로 override 에서는 다시 선언하지 않는다.
    pids_limit: 256
    mem_limit: ${OPENCLAW_MEM_LIMIT:-8g}
    memswap_limit: ${OPENCLAW_MEM_LIMIT:-8g}
    cpus: ${OPENCLAW_CPUS:-8}
